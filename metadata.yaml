name: Astrbot-plugin-bili-Randomvideoshit   # 原来为 astrbot_plugin_bili_random_video
display_name: B站随机视频搬运（支持分区）
version: 1.1.0
author: Rasutohda
description: 当有人@机器人时，自动从指定分区或全站随机搬运一个B站视频。
astrbot_version: ">=4.16.0,<5"
support_platforms:
  - aiocqhttp
  - telegram
  - discord
repo: https://github.com/Rasutohda/Astrbot-plugin-bili-Randomvideoshit   # 同步修改

config:
  region:
    title: 分区名称或ID
    type: string
    default: ""
    description: |
      输入B站分区名称（如 游戏、知识、音乐）或分区数字ID（如 4）。
      留空则使用全站排行榜。
